name: release
on:
  workflow_dispatch:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - name: check-is-release
        id: check
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Manual dispatch always releases. For pushes, only proceed when
          # the head commit message is a release bump from tools/release.sh.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$HEAD_MSG" | head -n1 | grep -Eq '^chore: release [0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Not a release commit; skipping."
          fi
      - name: check-is-signed
        if: steps.check.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # GitHub verifies the signature against keys registered to the
          # committer's account (SSH or GPG). Failing hard here prevents an
          # unsigned `chore: release` commit from publishing a release.
          VERIFICATION="$(gh api 'repos/${{ github.repository }}/commits/${{ github.sha }}' --jq '.commit.verification')"
          VERIFIED="$(jq -r '.verified' <<< "$VERIFICATION")"
          REASON="$(jq -r '.reason' <<< "$VERIFICATION")"
          if [ "$VERIFIED" != "true" ]; then
            echo "::error::Release commit ${{ github.sha }} is not signed (reason: $REASON)."
            echo "Sign your commits with a key registered to your GitHub account."
            exit 1
          fi
          echo "Commit signature verified ($REASON)."
  ci:
    needs: gate
    if: needs.gate.outputs.is_release == 'true'
    uses: ./.github/workflows/ci.yaml
  validate:
    needs: gate
    if: needs.gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Get version from pyproject.toml
        id: get_version
        run: |
          # Extract version from pyproject.toml using grep/sed (no nix needed)
          VERSION="$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"
          echo "Tag will be: ${TAG}"
      - name: Check if tag already exists
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          # Query the remote directly; fetch-tags alone does not work with
          # the default shallow clone (actions/checkout#1471), and rev-parse
          # would also match branches/SHAs rather than tags specifically.
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Error: Tag $TAG already exists!"
            echo "Please update the version in pyproject.toml before releasing."
            exit 1
          fi
          echo "Tag $TAG does not exist yet. Proceeding with release."
      - name: Check if version exists on PyPI
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # PyPI returns minified JSON (no space after colons), so grepping
          # for '"name": "beautysh"' would never match. Use the HTTP status
          # code instead: 200 = exists, 404 = not found.
          STATUS="$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/beautysh/$VERSION/json")"
          if [ "$STATUS" = "200" ]; then
            echo "Error: Version $VERSION already exists on PyPI!"
            echo "Please update the version in pyproject.toml before releasing."
            exit 1
          elif [ "$STATUS" != "404" ]; then
            echo "Error: Unexpected HTTP $STATUS from PyPI while checking for $VERSION."
            exit 1
          fi
          echo "Version $VERSION does not exist on PyPI yet. Proceeding with release."
  dist:
    needs: [ci, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/nix
            ~root/.cache/nix
          key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-${{ runner.arch }}-
      - uses: cachix/cachix-action@v16
        with:
          name: beautysh
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: dist
        run: |
          nix build .#dist
          mkdir -p dist
          cp -vL result/* dist/.
      - uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
  github-release:
    needs: [dist, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Release ${{ needs.validate.outputs.tag }}
          generate_release_notes: true
          files: dist/*
          draft: false
          prerelease: false
          token: ${{ secrets.PAT }}
