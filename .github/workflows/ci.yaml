name: ci
on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
  workflow_call:
jobs:
  nix-eval:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.eval.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/nix
            ~root/.cache/nix
          key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-${{ runner.arch }}-
      - name: Evaluate flake matrix
        id: eval
        run: |
          echo "matrix=$(nix eval --json '.#githubActions.matrix')" >> "$GITHUB_OUTPUT"
  nix-matrix:
    name: ${{ matrix.name }} (${{ matrix.system }})
    runs-on: ${{ matrix.os }}
    needs: nix-eval
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.nix-eval.outputs.matrix) }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/nix
            ~root/.cache/nix
          key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-${{ runner.arch }}-
      - uses: cachix/cachix-action@v16
        with:
          name: beautysh
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name == 'pull_request' }}
      - name: Build ${{ matrix.name }} (${{ matrix.system }})
        run: nix build -L '.#${{ matrix.attr }}'
      - uses: codecov/codecov-action@v5
        if: matrix.name == 'coverage' && matrix.system == 'x86_64-linux'
        with:
          files: result/coverage.xml
          use_oidc: true
          fail_ci_if_error: true
  ci-gate:
    if: always()
    # nix-eval is covered transitively: nix-matrix needs it, so if nix-eval
    # fails nix-matrix skips, and alls-green treats skip as failure.
    # Including nix-eval directly breaks alls-green because its matrix output
    # contains escaped quotes that get mangled through the action's heredoc.
    needs: [nix-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
